name = "pteprep-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[r2_buckets]]
binding = "PTEPREP_MEDIA"
bucket_name = "pteprep-media"

[[queues.producers]]
queue = "pteprep-scoring-queue"
binding = "SCORING_QUEUE"

[[queues.consumers]]
queue = "pteprep-scoring-queue"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
simple = { limit = 100, period = 60 }
